<html lang="en">

    <title>2026 Costa Rican Legislative Assembly Allocations</title>

    <!-- Chart.js CDN -->

    <style>
        /* Smooth transitions for the interactive map paths */
        .province-path {
            transition: fill 0.2s ease, stroke-width 0.2s ease;
            cursor: pointer;

        /* Hover effect slightly darkens the province if it isn't the active one */
        .province-path:hover:not(.active-province) {

        }

</head>

            <!-- RIGHT PANEL: Charts & Visuals (Spans 7 columns on large screens) -->
            <div class="lg:col-span-7">
                <div id="breakdown-view" class="bg-white rounded-lg shadow-sm border border-slate-200 p-6 flex flex-col sm:flex-row items-center justify-center gap-8 h-full">
                    
                    <!-- Chart Canvas -->
                    <div class="w-full sm:w-1/2 max-w-[280px]">
                        <canvas id="breakdown-chart"></canvas>
                    </div>
                    
                    <!-- Detail List -->
                    <div class="w-full sm:w-1/2 flex flex-col self-start">
                        <h3 id="breakdown-title" class="text-xl font-bold text-slate-800 mb-4 border-b pb-2"></h3>
                        <div id="breakdown-details" class="space-y-1"></div>
                    </div>

                </div>
            </div>

        </section>

    </main>

    <!-- Script to dynamically load JSON data and handle dashboard interactivity -->
    <script>
        // Define party color configurations
        const partyStyles = {
            "Pueblo Soberano": { css: "bg-teal-500 text-teal-50", hex: "#14b8a6" },
            "Liberación Nacional": { css: "bg-green-600 text-green-50", hex: "#16a34a" },
            "Frente Amplio": { css: "bg-yellow-400 text-yellow-900", hex: "#facc15" },
            "Unidad Social Cristiana": { css: "bg-blue-600 text-blue-50", hex: "#2563eb" },
            "Nueva República": { css: "bg-sky-500 text-sky-50", hex: "#0ea5e9" },
            "Coalición Agenda Ciudadana": { css: "bg-red-500 text-red-50", hex: "#ef4444" }
        };

        function getStyle(party) {
            return partyStyles[party] || { css: "bg-slate-200 text-slate-800", hex: "#94a3b8" };
        }

        let pieChart = null;

        // Fetch your external Python-generated JSON data file
        fetch('election_results.json')
            .then(response => {
                if (!response.ok) throw new Error("HTTP error reading JSON!");
                return response.json();
            })
            .then(electionData => {
                
                // 1. Render Top National Summary Grid Cards
                const nationalContainer = document.getElementById('national-container');
                for (const [party, seats] of Object.entries(electionData.national_total)) {
                    const style = getStyle(party);
                    nationalContainer.innerHTML += `
                        <div class="${style.css} p-4 rounded-md border border-slate-100 flex flex-col items-center justify-center text-center shadow-sm">
                            <span class="text-3xl font-black mb-1">${seats}</span>
                            <span class="text-xs font-semibold uppercase tracking-wide leading-tight">${party}</span>
                        </div>
                    `;
                }

                // 2. Setup the Dropdown Select Options
                const areaSelect = document.getElementById('area-select');
                const provinceNames = Object.keys(electionData.provinces);
                
                provinceNames.forEach(province => {
                    const option = document.createElement('option');
                    option.value = province;
                    option.textContent = province;
                    areaSelect.appendChild(option);
                });

                // 3. Centralized Function to Update Map Highlights, Titles, Data Rows, and Pie Chart
                function renderChartView(selection) {
                    let dataToDisplay = {};
                    let titleText = "";

                    // A. Determine dataset based on choice
                    if (selection === "National") {
                        dataToDisplay = electionData.national_total;
                        titleText = "National Total (57 Seats)";
                    } else {
                        dataToDisplay = electionData.provinces[selection].allocation;
                        const seats = electionData.provinces[selection].total_seats_available;
                        titleText = `${selection} (${seats} Seats)`;
                    }

                    // B. Sync Map Colors (Green for active, Light gray for rest)
                    document.querySelectorAll('.province-path').forEach(path => {
                        // Remove hover class block if it was selected
                        path.classList.remove('active-province');
                        
                        if (path.id === selection) {
                            path.style.fill = '#22c55e'; // Tailwind green-500 highlight
                            path.classList.add('active-province'); // Prevent hover graying out active item
                            // Bring active path to front so its white borders sit cleanly on top
                            path.parentNode.appendChild(path); 
                        } else {
                            path.style.fill = '#e2e8f0'; // Tailwind slate-200 normal unselected
                        }
                    });

                    // C. Update Text Header
                    document.getElementById('breakdown-title').textContent = titleText;

                    // D. Parse items for chart arrays & construct data item rows
                    const labels = [];
                    const chartData = [];
                    const backgroundColors = [];
                    const detailsContainer = document.getElementById('breakdown-details');
                    
                    detailsContainer.innerHTML = ''; // Clear prior elements

                    for (const [party, seats] of Object.entries(dataToDisplay)) {
                        if (seats > 0) { 
                            const style = getStyle(party);
                            
                            labels.push(party);
                            chartData.push(seats);
                            backgroundColors.push(style.hex);
                            if (seats == 1) {
                                detailsContainer.innerHTML += `
                                    <div class="flex justify-between items-center py-2 border-b border-slate-100 last:border-0">
                                        <span class="text-sm font-medium text-slate-700">${party}</span>
                                        <span class="${style.css} text-xs font-bold px-2 py-1 rounded-full shadow-sm">1 seat</span>
                                    </div>
                                `;
                            } else {
                                detailsContainer.innerHTML += `
                                    <div class="flex justify-between items-center py-2 border-b border-slate-100 last:border-0">
                                        <span class="text-sm font-medium text-slate-700">${party}</span>
                                        <span class="${style.css} text-xs font-bold px-2 py-1 rounded-full shadow-sm">${seats} seats</span>
                                    </div>
                                `;
                            }
                            
                        }
                    }

                    // E. Handle Chart.js Instantiation or Update animations
                    const ctx = document.getElementById('breakdown-chart').getContext('2d');
                    if (pieChart) {
                        pieChart.data.labels = labels;
                        pieChart.data.datasets[0].data = chartData;
                        pieChart.data.datasets[0].backgroundColor = backgroundColors;
                        pieChart.update();
                    } else {
                        pieChart = new Chart(ctx, {
                            type: 'pie',
                            data: {
                                labels: labels,
                                datasets: [{
                                    data: chartData,
                                    backgroundColor: backgroundColors,
                                    borderWidth: 1,
                                    borderColor: '#ffffff'
                                }]
                            },
                            options: {
                                responsive: true,
                                plugins: {
                                    legend: { display: false } // Hidden because side panel lists them beautifully
                                }
                            }
                        });
                    }
                }

                // 4. Connect Dropdown Interactions
                areaSelect.addEventListener('change', (e) => {
                    renderChartView(e.target.value);
                });

                // 5. Connect Interactive SVG Map Click Events
                document.querySelectorAll('.province-path').forEach(path => {
                    path.addEventListener('click', () => {
                        areaSelect.value = path.id; // Switch selection box value
                        renderChartView(path.id);   // Redraw layout data views
                    });
                });

                // 6. Draw National Profile by Default on Initial Application Load
                renderChartView("National");
            })
            .catch(error => {
                console.error("Error loading the dashboard payload setup:", error);
                document.getElementById('national-container').innerHTML = `
                    <div class="col-span-full text-red-600 font-medium p-4 text-center">
                        Failed to load data. Ensure 'election_results.json' is present in the local server directory.
                    </div>
                `;
            });
    </script>
